name: Deploy to Vercel

# Replaces Vercel's native GitHub integration, which can silently stall.
# This workflow always runs vercel deploy --prod on every push to main,
# so you get a visible CI failure instead of a silent deployment freeze.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to production
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_Sfc7y9iKuMifBSMrJoPsrIC1
          VERCEL_PROJECT_ID: prj_U8jMeCOh2zNnedzqbvVPenA7YQVL
